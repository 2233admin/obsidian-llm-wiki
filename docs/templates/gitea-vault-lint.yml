name: Vault Doctor

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vault-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout LLMwiki tools
        run: git clone --depth 1 https://github.com/2233admin/obsidian-llm-wiki.git .llmwiki-tools
      - name: Run LLMwiki doctor
        run: python3 .llmwiki-tools/scripts/llmwiki_doctor.py --vault . --json
      - name: Report knowledge health
        run: python3 .llmwiki-tools/scripts/knowledge_health.py --vault . --json
