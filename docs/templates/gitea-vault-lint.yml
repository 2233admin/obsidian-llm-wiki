name: Vault Collaboration Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vault-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout LLMwiki tools
        run: git clone --depth 1 https://github.com/2233admin/obsidian-llm-wiki.git .llmwiki-tools
      - name: Lint vault collaboration rules
        run: python3 .llmwiki-tools/scripts/vault_collab_lint.py --vault .
