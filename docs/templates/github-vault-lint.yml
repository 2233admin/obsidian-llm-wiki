name: Vault Doctor

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vault-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Checkout LLMwiki tools
        uses: actions/checkout@v4
        with:
          repository: 2233admin/obsidian-llm-wiki
          path: .llmwiki-tools
      - name: Run LLMwiki doctor
        run: python .llmwiki-tools/scripts/llmwiki_doctor.py --vault . --json
      - name: Report knowledge health
        run: python .llmwiki-tools/scripts/knowledge_health.py --vault . --json
