# LLM Wiki -- runtime configuration example
#
# Copy this file to `vault-mind.yaml` (git-ignored) and edit paths/flags
# for your machine. Or skip the yaml entirely and set
# VAULT_MIND_VAULT_PATH env var.
#
# Parser note: the server uses a minimal flat-line YAML parser. Keep
# `vault_path:` at indent 0 -- nested `vault_path` will not be picked up.

vault_path: "/absolute/path/to/your/obsidian/vault"

# Optional: bearer token required on tool calls (leave empty to disable).
# auth_token: "some-secret"

# Optional: restrict which adapters to load. Default (commented) loads all:
# filesystem, memu, gitnexus, obsidian, vaultbrain.
# adapters: "filesystem,vaultbrain"

# Optional: per-adapter ranking weight for unified search.
# adapter_weight_filesystem: 1.0
# adapter_weight_vaultbrain: 0.8
# adapter_weight_memu: 0.6

adapters:
  filesystem:
    enabled: true
  obsidian:
    enabled: false       # set true if Obsidian is running with the WS bridge
  memu:
    enabled: false       # requires memU PostgreSQL + Python venv
  gitnexus:
    enabled: false       # requires gitnexus CLI on PATH

compiler:
  model_tier: "haiku"
  chunk_size: 1000
  chunk_overlap: 200
  auto_compile_threshold: 3

agent:
  enabled: false

# Connector sweep (LMVK L1): `python scheduler.py --connectors` runs every
# enabled source whose interval has elapsed, records last-run state, exits.
# One schtasks/cron entry pulls the sweep; per-source cadence lives here.
# interval: 90s / 60m / 6h / 1d (bare number = minutes).
# Extra keys per source are passed to the connector's fetch() as kwargs.
connectors:
  output_root: "raw"                            # relative to vault_path (or absolute)
  state_file: ".vault-mind-connectors.json"     # last-run ledger, relative to vault_path
  sources:
    hackernews:
      enabled: true
      interval: 60m
      limit: 15
    chubby-radar:                               # chubbyskills industry radar: HN + V2EX + Chinese RSS
      connector: chubby
      channel: radar
      enabled: true
      interval: 6h
      hours: 24
      rss: "https://www.ithome.com/rss/,https://sspai.com/feed"
    chubby-wechat:                              # HITL: needs bs4 upstream + article URL queue
      connector: chubby
      channel: wechat
      enabled: false
      interval: 12h
    chubby-bilibili:                            # HITL: needs yt-dlp upstream + video URL queue
      connector: chubby
      channel: bilibili
      enabled: false
      interval: 12h
    chubby-xiaohongshu:                         # HITL: needs XHS_COOKIE credential + note URL queue
      connector: chubby
      channel: xiaohongshu
      enabled: false
      interval: 12h
    chubby-x:                                   # HITL: needs tweet URL queue (no login required)
      connector: chubby
      channel: x
      enabled: false
      interval: 12h
    gmail:                                      # scaffold: needs GMAIL_OAUTH_TOKEN + real API impl
      enabled: false
      interval: 12h
    x:                                          # scaffold: needs X_API_BEARER_TOKEN + real API impl
      enabled: false
      interval: 12h
    web_search:                                 # scaffold: needs TAVILY_API_KEY + real API impl
      enabled: false
      interval: 12h
