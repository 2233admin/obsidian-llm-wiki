name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: oven-sh/setup-bun@v2
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run settings:build
      - run: cd packages/settings-platform && bun test tests/
      - run: cd mcp-server && npm run build
      - run: cd mcp-server && npm run typecheck
      - run: cd mcp-server && npm run test
      - name: Verify committed MCP bundle is current
        run: cd mcp-server && npm run verify:bundle
      - name: Install Obsidian plugin dependencies
        run: cd obsidian-plugin && npm ci
      - name: Test Obsidian plugin
        run: cd obsidian-plugin && npm run test
      - name: Typecheck Obsidian plugin
        run: cd obsidian-plugin && npm run typecheck
      - name: Build Obsidian plugin
        run: cd obsidian-plugin && npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pytest orjson
      - run: cd compiler && ruff check . ../run_aide.py
      - run: python -m pytest tests/ -q --ignore=compiler/
      - run: python -m pytest compiler/tests/ -q
      - run: bun test scripts/verify_fleet_workflow.test.ts
      - run: bun scripts/verify_fleet_workflow.ts --phase all --json
      - run: npx -y @fission-ai/openspec@1.6.0 validate complete-settings-platform-and-fleet-release --strict
      - name: Smoke-test shipped MCP bundle operations
        run: python scripts/verify_release_install.py --json

  build-mcp:
    name: Build MCP Server
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run rebuild
      - name: Verify generated MCP bundle is committed
        run: git diff --exit-code -- mcp-server/bundle.js
      - name: Smoke-test packaged MCP runtime
        run: python scripts/verify_release_install.py --json
      - name: Package MCP Server
        run: tar czf obsidian-llm-wiki-mcp.tar.gz -C mcp-server bundle.js package.json dist
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-server
          path: obsidian-llm-wiki-mcp.tar.gz

  build-compiler:
    name: Build Compiler
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Package compiler
        run: |
          tar czf obsidian-llm-wiki-compiler.tar.gz compiler/
      - uses: actions/upload-artifact@v4
        with:
          name: compiler
          path: obsidian-llm-wiki-compiler.tar.gz

  build-plugin:
    name: Build Obsidian Plugin
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd obsidian-plugin && npm ci && npm run build
      - name: Package Obsidian plugin
        run: tar czf obsidian-llm-wiki-plugin.tar.gz -C obsidian-plugin main.js manifest.json styles.css
      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: obsidian-llm-wiki-plugin.tar.gz

  release:
    name: Create Release
    needs: [build-mcp, build-compiler, build-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download MCP Server
        uses: actions/download-artifact@v4
        with:
          name: mcp-server
          path: dist-mcp
      - name: Download Compiler
        uses: actions/download-artifact@v4
        with:
          name: compiler
          path: dist-compiler
      - name: Download Obsidian Plugin
        uses: actions/download-artifact@v4
        with:
          name: obsidian-plugin
          path: dist-plugin
      - name: List files
        run: |
          ls -la dist-mcp/
          ls -la dist-compiler/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist-mcp/*.tar.gz
            dist-compiler/*.tar.gz
            dist-plugin/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
