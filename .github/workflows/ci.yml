name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Install dependencies once, reuse across jobs
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache node modules
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            mcp-server/node_modules
            ~/.cache/pip
          key: ${{ runner.os }}-deps-${{ hashFiles('mcp-server/package-lock.json') }}
      - name: Install node deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: cd mcp-server && npm install
      - name: Install Python deps
        run: pip install ruff

  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore node modules
        uses: actions/cache@v4
        with:
          path: mcp-server/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('mcp-server/package-lock.json') }}
      - run: cd mcp-server && npm run build

  typecheck:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore node modules
        uses: actions/cache@v4
        with:
          path: mcp-server/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('mcp-server/package-lock.json') }}
      - run: cd mcp-server && npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore node modules
        uses: actions/cache@v4
        with:
          path: mcp-server/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('mcp-server/package-lock.json') }}
      - run: cd mcp-server && npm test

  lint-python:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
      - name: Install ruff
        run: pip install ruff
      - run: cd compiler && ruff check .

  lint-typescript:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore node modules
        uses: actions/cache@v4
        with:
          path: mcp-server/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('mcp-server/package-lock.json') }}
      - run: cd mcp-server && npx eslint src/ --ext .ts

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest
      - name: Run compiler tests
        run: python -m pytest tests/ -v --tb=short
