name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared-domains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: oven-sh/setup-bun@v2
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run settings:build
      - run: cd packages/settings-platform && bun test tests/
      - run: cd packages/agent-domain && npm ci && bun test tests/ && npm run typecheck && npm run build

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run build

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run build && npm test

  release-runtime-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: cd mcp-server && npm ci
      - name: Verify committed MCP bundle is current
        run: cd mcp-server && npm run verify:bundle
      - name: Build Obsidian plugin for release security scan
        run: cd obsidian-plugin && npm ci && npm run build
      - name: Verify release secrets, provenance, and runtime licenses
        run: python scripts/verify_release_security.py --json
      - name: Smoke-test shipped MCP bundle operations
        run: python scripts/verify_release_install.py --json

  obsidian-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Obsidian plugin dependencies
        run: cd obsidian-plugin && npm ci
      - name: Test Obsidian plugin
        run: cd obsidian-plugin && npm run test
      - name: Typecheck Obsidian plugin
        run: cd obsidian-plugin && npm run typecheck
      - name: Build Obsidian plugin
        run: cd obsidian-plugin && npm run build
      - name: Verify Obsidian plugin production bundle boundary
        run: cd obsidian-plugin && npm run verify:bundle-boundary

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: cd compiler && ruff check . ../run_aide.py

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Build Obsidian plugin release input
        run: cd obsidian-plugin && npm ci && npm run build
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short --ignore=compiler/

  test-compiler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: pip install pytest orjson
      - run: python -m pytest compiler/tests/ -q

  fleet-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run platforms:build
      - run: bun test scripts/verify_fleet_workflow.test.ts
      - run: bun scripts/verify_fleet_workflow.ts --phase all --json

  windows-filesystem:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: npm ci
        working-directory: mcp-server
      - run: npm run platforms:build
        working-directory: mcp-server
      - run: bun test src/settings/settings.test.ts src/project/project-hub.test.ts src/workflow/workflow.test.ts
        working-directory: mcp-server
      - run: npm run typecheck
        working-directory: mcp-server
      - run: npm ci
        working-directory: packages/agent-domain
      - run: bun test tests/
        working-directory: packages/agent-domain
      - run: npm run typecheck
        working-directory: packages/agent-domain
      - run: npm run build
        working-directory: packages/agent-domain
      - run: python -m pip install pytest
      - run: python -m pytest compiler/tests/test_settings_platform.py compiler/tests/test_work_driver.py compiler/tests/test_project_migration.py -q --basetemp "$env:RUNNER_TEMP\pytest-windows"

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx -y @fission-ai/openspec@1.6.0 validate --all --strict
