<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>obsidian-llm-wiki — Concept Graph Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>

<header>
  <h1>obsidian-llm-wiki — Concept Graph</h1>
  <div class="paste-area">
    <label for="graph-json">Paste your graph.json:</label>
    <textarea id="graph-json" placeholder="Paste the output of concept_graph.py here..."></textarea>
    <button id="load-btn" disabled>Loading…</button>
  </div>
</header>

<div id="error-msg"></div>
<div id="cy-container"></div>

<div id="stats">
  <span>nodes: <b>—</b></span>
  <span>edges: <b>—</b></span>
  <span class="wikilink">wikilink: <b>—</b></span>
  <span class="tag">tag: <b>—</b></span>
  <span class="unresolved">unresolved: <b>—</b></span>
</div>

<script src="viewer.js"></script>

</body>
</html>
